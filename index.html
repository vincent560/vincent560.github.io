<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>何柏霆 | 轉學考作品集</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans">
    <div class="max-w-4xl mx-auto py-20 px-6">
        <header class="text-center mb-16">
            <h1 class="text-5xl font-bold mb-4">何柏霆 Boting He</h1>
            <p class="text-xl text-slate-400 italic">"橋接底層邏輯與現代技術的開發者"</p>
        </div>

        <section class="bg-slate-800 p-8 rounded-2xl mb-12 shadow-xl border border-slate-700">
            <h2 class="text-2xl font-bold mb-4 text-emerald-400">▍ 學習理念：工程師的價值在於解決問題的維度</h2>
            <p class="leading-relaxed text-slate-300">
                我不追求盲目跟風最新技術，而是致力於理解**底層原理**。從 C 語言的指標操作中磨練嚴謹，在 AI 資料科學中訓練洞察，並透過現代全端技術實現價值。我深信，AI 是時代的加速器，而真正的工程師應專注於架構規劃與邏輯推演，而非重複勞動。
            </p>
        </section>

        <div class="grid md:grid-cols-2 gap-6">
            <div class="p-6 border border-slate-700 rounded-xl hover:bg-slate-800 transition">
                <h3 class="text-xl font-bold mb-2">經典貪食蛇 3.0 (C++)</h3>
                <p class="text-slate-400 text-sm mb-4">指標、鏈結串列、Windows API 實作。</p>
                <a href="#" class="text-emerald-400 hover:underline">查看詳情 & 影片 →</a>
            </div>
            <div class="p-6 border border-slate-700 rounded-xl hover:bg-slate-800 transition">
                <h3 class="text-xl font-bold mb-2">人臉資料處理 (AI/Python)</h3>
                <p class="text-slate-400 text-sm mb-4">Isomap 流形學習、特徵臉降維練習。</p>
                <a href="#" class="text-emerald-400 hover:underline">查看分析報告 →</a>
            </div>
        </div>
    </div>
</body>
</html>
